<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MedIntel AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/reset-password.js" defer></script>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card reset-card">
            <div class="auth-header">
                <div class="auth-logo">MI</div>
                <p class="auth-kicker">Secure Account Recovery</p>
                <h1>Reset Password</h1>
                <p>Request a one-time code by email and set a new password. Your current password is never shown.</p>
            </div>

            <form id="requestResetForm" class="auth-form">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input id="resetEmail" type="email" autocomplete="email" placeholder="Enter your account email" required>
                </div>
                <button id="requestResetButton" class="auth-btn" type="submit">Send Reset OTP</button>
            </form>

            <div id="requestResetMessage" class="auth-message"></div>

            <form id="completeResetForm" class="auth-form reset-complete-form">
                <div class="form-group">
                    <label for="resetOtp">OTP Code</label>
                    <input id="resetOtp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code"
                        placeholder="6-digit code" required>
                </div>

                <div class="form-group">
                    <label for="resetNewPassword">New Password</label>
                    <input id="resetNewPassword" type="password" autocomplete="new-password" placeholder="Create new password" required>
                </div>

                <div class="form-group">
                    <label for="resetConfirmPassword">Confirm New Password</label>
                    <input id="resetConfirmPassword" type="password" autocomplete="new-password" placeholder="Confirm new password" required>
                </div>

                <button id="completeResetButton" class="auth-btn" type="submit">Reset Password</button>
            </form>

            <div id="completeResetMessage" class="auth-message"></div>

            <p class="auth-switch">
                Remember your password?
                <a href="login.html">Back to login</a>
            </p>
        </div>
    </div>
</body>

</html>
